# ==============================================================================
# ontap-sim-2node-proxmox.conf
# Configuration file for ontap-sim-2node-proxmox-v2.9.sh
#
# This file contains all customizable settings for ONTAP Simulator deployment.
# Copy this file and modify as needed, then pass to the script:
#   ./ontap-sim-2node-proxmox-v2.9.sh --config my-config.conf
# or set CONFIG_FILE environment variable:
#   CONFIG_FILE=my-config.conf ./ontap-sim-2node-proxmox-v2.9.sh
# ==============================================================================

# ---------- Storage Configuration ----------
# Proxmox storage-id for VM disks
VM_STORAGE="datastore_ds02"

# Proxmox storage-id where the OVA is located
OVA_STORAGE_ID="software"

# Full path to the directory containing the OVA
OVA_DIR="/mnt/pve/${OVA_STORAGE_ID}/template/iso"

# Filename of the OVA
OVA_NAME="vsim-netapp-DOT9.16.1-cm_nodar.ova"

# ---------- Cluster Naming ----------
# Prefix for VM names (schema: {prefix}-cluster{NN}-{01|02})
# Example: sim-cluster01-01, sim-cluster01-02
CLUSTER_PREFIX="sim"

# Cluster number: auto (first free number) or explicit (e.g., 01, 02, 03)
CLUSTER_NUM="auto"

# ---------- Node and VMID Assignment ----------
# Proxmox node for node1 of the cluster
TARGET_NODE1="pve02"

# Proxmox node for node2 of the cluster
TARGET_NODE2="pve04"

# VMID for node1 (auto = cluster-wide free ID)
VMID1="auto"

# VMID for node2 (auto = first free ID after VMID1)
VMID2="auto"

# ---------- Network Configuration ----------
# Bridge voor cluster-, nfs- en iscsi-verkeer
DATA_BRIDGE="vmbr1"

# VLAN tag voor cluster/nfs/iscsi (0 = geen tag)
DATA_VLAN_TAG="20"

# Bridge voor cifs-verkeer (client-facing)
CIFS_BRIDGE="vmbr0"

# VLAN tag voor cifs (0 = geen tag)
CIFS_VLAN_TAG="0"

# Aantal netwerk poorten per VM
# Formule: 2 (cluster) + 3*N (data)  →  (NUM_NET_PORTS - 2) % 3 == 0
#
# Bridge-toewijzing per poort:
#   net0, net1          : cluster interconnect  → DATA_BRIDGE
#   volgende N poorten  : cifs (ifgroup a0a)    → CIFS_BRIDGE
#   volgende N poorten  : nfs  (ifgroup a0b)    → DATA_BRIDGE
#   laatste N poorten   : iscsi (individueel)   → DATA_BRIDGE
#
# Geldige waarden: 5 (1+1+1), 8 (2+2+2), 11 (3+3+3), 14 (4+4+4), ...
NUM_NET_PORTS="8"

# ---------- VM Hardware Configuration ----------
# Number of CPU cores per VM
CORES="2"

# Number of sockets per VM
SOCKETS="1"

# RAM per VM in MB
MEMORY_MB="8192"

# QEMU CPU type (e.g., SandyBridge, Haswell, EPYC)
CPU_TYPE="SandyBridge"

# Network model (e.g., e1000, virtio)
NET_MODEL="e1000"

# ---------- Disk Configuration ----------
# Disk format for import (raw or qcow2)
DISK_FORMAT="raw"

# ---------- Operation Modes ----------
# Start VMs immediately after creation (1=yes, 0=no)
START_AFTER_CREATE="0"

# Inject unique SYS_SERIAL_NUM and SYSID via guestfish (1=yes, 0=no)
AUTOMATE_NODE2_SYSID="1"

# ---------- ONTAP Simulator Serial Numbers ----------
# Fixed license serials for ONTAP Simulator
# Node1 serial numbers
NODE1_SYS_SERIAL_NUM="4082368-50-7"
NODE1_SYSID="4082368507"

# Node2 serial numbers (unique per node)
NODE2_SYS_SERIAL_NUM="4034389-06-2"
NODE2_SYSID="4034389062"

# ---------- Script Runtime Configuration ----------
# Working directory for temporary files
WORKDIR="/var/tmp/ontap-sim-9.16.1"

# Timeout in seconds for serial console operations
EXPECT_TIMEOUT="360"

# SSH options for remote execution
SSH_OPTS="-o BatchMode=yes -o ConnectTimeout=5 -o StrictHostKeyChecking=accept-new"
